# Netlify configuration for PersonalPlanerMVP.
#
# The libSQL Prisma adapter has no binary engine, so the only build-time
# step is `prisma generate` to materialise the generated client before
# `next build`.
#
# Required environment variables (set them in Site settings → Environment
# variables, NOT in this file):
#   DATABASE_URL          libsql://<your-db>.turso.io  (or postgres URL)
#   DATABASE_AUTH_TOKEN   <Turso auth token>           (Turso only)
#   AUTH_SECRET           openssl rand -base64 32
#
# After the first deploy, push the schema once:
#   DATABASE_URL=... npx prisma db push
#   DATABASE_URL=... npm run db:seed   # optional demo data

[build]
  command = "npx prisma generate && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  AUTH_TRUST_HOST = "true"

# Pin the official Netlify Next.js adapter. Remove this `[[plugins]]` block
# to use Netlify's auto-managed OpenNext adapter, which keeps the runtime
# in sync with the latest Next.js releases (Netlify's recommendation).
[[plugins]]
  package = "@netlify/plugin-nextjs"
