# Netlify configuration for PersonalPlanerMVP.
#
# The libSQL Prisma adapter has no binary engine, so the only build-time
# step is `prisma generate` to materialise the generated client before
# `next build`.
#
# Required environment variables (Site settings → Environment variables,
# scope “Production”, NOT in this file):
#   DATABASE_URL          libsql://<your-db>.turso.io  (required in production)
#   DATABASE_AUTH_TOKEN   Turso DB token (required with libsql://)
#   AUTH_SECRET           random secret for Auth.js (required; e.g. openssl rand -base64 32)
# If DATABASE_URL is missing, the app used to fall back to local file SQLite and crash on Netlify.
#
# After the first deploy, push the schema once:
#   DATABASE_URL=... npx prisma db push
#   DATABASE_URL=... npm run db:seed   # optional demo data

[build]
  command = "npx prisma generate && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  AUTH_TRUST_HOST = "true"

# Pin the Next.js runtime plugin explicitly so build-cache invalidation is
# tied to package-lock.json (instead of Netlify's auto-installed plugin
# version, which can keep a stale compiled middleware bundle even after
# "Clear cache and deploy site"). Keep this in sync with package.json.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Production now lives on Vercel — Netlify is kept only as a forwarder so
# the personalplanermvp.netlify.app URL we already shared keeps working.
# `force = true` makes Netlify redirect even on paths that match a built
# page/function, so no Next.js output ever reaches users from this host.
# `:splat` preserves the path; query strings are forwarded automatically.
[[redirects]]
  from = "/*"
  to = "https://personal-planer-mvp.vercel.app/:splat"
  status = 301
  force = true
