name: E2E (Playwright)

# Optionales E2E: nicht Teil des PR-blocking CI-Jobs („ci.yml“).
# Manuelles Triggern oder nach Merge auf „main“, wenn DB + Seed erfolgreich laufen.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Migrate, seed & Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      DATABASE_URL: file:./prisma/e2e.db
      AUTH_SECRET: playwright-ci-placeholder-not-a-real-production-secret
      AUTH_TRUST_HOST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Migrate & seed SQLite
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install chromium --with-deps

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
