name: E2E (Playwright)

# Optionales E2E: nicht Teil des PR-blocking CI-Jobs („ci.yml“).
# Manuelles Triggern oder nach Merge auf „main“, wenn DB + Seed erfolgreich laufen.

on:
  workflow_dispatch:
    inputs:
      preview_base_url:
        description: "Optional deployed preview URL (e.g. https://<site>.netlify.app). If set, runs hosted auth smoke instead of local migrate/seed E2E."
        required: false
        type: string
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Migrate, seed & Playwright
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.preview_base_url == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      DATABASE_URL: file:./prisma/e2e.db
      AUTH_SECRET: playwright-ci-placeholder-not-a-real-production-secret
      AUTH_TRUST_HOST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Migrate & seed SQLite
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install chromium --with-deps

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  hosted-auth-smoke:
    name: Hosted auth smoke (preview URL)
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preview_base_url != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
      PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.inputs.preview_base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install chromium --with-deps

      - name: Run auth/session smoke on hosted preview
        run: npx playwright test e2e/auth/session-flow.spec.ts --config=playwright.no-webserver.config.ts

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-hosted-auth
          path: playwright-report/
